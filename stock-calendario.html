<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
<style>
  :root{
    --bg-page:#0f1117;--bg-surface:#181b23;--bg-card:#1e222d;--bg-input:#252932;--bg-hover:#252d3a;--bg-active:#1a2a1f;
    --border:rgba(255,255,255,0.07);--border-md:rgba(255,255,255,0.12);--border-accent:rgba(74,222,128,.35);
    --text-primary:#e8eaf0;--text-secondary:#9da3b4;--text-muted:#5a6070;
    --accent:#4ade80;--accent-dim:rgba(74,222,128,0.15);--red-logo:#C0170C;--radius-md:9px;
    --in-emision:#4ade80;--in-reversa:#22d3ee;--in-transf:#818cf8;--in-otras:#a3e635;
    --out-devol:#f87171;--out-retiro:#fb923c;--out-transf:#c084fc;--out-reconf:#fbbf24;--out-otras:#f472b6;--out-reub:#94a3b8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;font-family:'Inter',sans-serif;font-size:13px;background:var(--bg-page);color:var(--text-primary);-webkit-font-smoothing:antialiased;}
  .topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:50px;background:var(--bg-surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.25rem;gap:12px;}
  .logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:inherit;}
  .logo-mark{width:30px;height:30px;object-fit:contain;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));}
  .logo-name{font-weight:600;font-size:13.5px;}
  .logo-sep{width:1px;height:18px;background:var(--border-md);margin:0 6px;}
  .topbar-title{font-size:12.5px;color:var(--text-secondary);display:flex;align-items:center;gap:7px;}
  .live-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 2.5s ease-in-out infinite;box-shadow:0 0 6px var(--accent);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .avatar{width:27px;height:27px;border-radius:50%;background:#1a2a1f;color:var(--accent);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;border:1px solid var(--border-accent);}
  .user-email{font-size:11.5px;color:var(--text-secondary);}
  .logout-btn{color:#f87171;text-decoration:none;font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);}
  .back-btn{font-size:11.5px;color:var(--text-secondary);text-decoration:none;padding:5px 11px;border:1px solid var(--border-md);border-radius:6px;transition:all .15s;display:flex;align-items:center;gap:5px;}
  .back-btn:hover{color:var(--text-primary);background:var(--bg-hover);}
  .wrap{max-width:1200px;margin:0 auto;padding:70px 1.5rem 3rem;}
  .page-title{font-size:20px;font-weight:700;letter-spacing:-.3px;}
  .page-title .em{color:var(--accent);}
  .breadcrumb{font-size:11.5px;color:var(--text-muted);margin-top:5px;margin-bottom:18px;}

  .controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;margin-bottom:16px;}
  .ctrl-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
  .seg{display:inline-flex;background:var(--bg-input);border:1px solid var(--border-md);border-radius:7px;overflow:hidden;}
  .seg button{background:transparent;border:none;color:var(--text-secondary);font-family:inherit;font-size:12px;font-weight:500;padding:6px 13px;cursor:pointer;transition:all .12s;}
  .seg button.on{background:var(--accent);color:#0f1117;font-weight:600;}
  .seg button:not(.on):hover{background:var(--bg-hover);color:var(--text-primary);}
  .mes-nav{display:flex;align-items:center;gap:10px;margin-left:auto;}
  .mes-nav button{width:30px;height:30px;border-radius:6px;background:var(--bg-input);border:1px solid var(--border-md);color:var(--text-primary);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .mes-nav button:hover:not(:disabled){background:var(--accent);color:#0f1117;}
  .mes-nav button:disabled{opacity:.4;cursor:wait;}
  .mes-titulo{font-size:15px;font-weight:600;min-width:150px;text-align:center;}

  .resumen{display:none;gap:22px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 18px;margin-bottom:16px;flex-wrap:wrap;}
  .res-item{display:flex;flex-direction:column;gap:2px;}
  .res-lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600;}
  .res-val{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;}
  .cal-dow{text-align:center;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);padding:4px 0;}
  .cal-cell{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 9px;min-height:82px;cursor:pointer;transition:all .13s;display:flex;flex-direction:column;gap:3px;position:relative;}
  .cal-cell:hover:not(.empty):not(.nodata){border-color:var(--border-accent);background:var(--bg-hover);transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.3);}
  .cal-cell.empty{background:transparent;border:none;cursor:default;}
  .cal-cell.nodata{cursor:default;opacity:.5;}
  .cal-cell.finde{background:#15171e;}
  .cal-num{font-size:11px;font-weight:600;color:var(--text-muted);}
  .cal-saldo{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text-primary);margin-top:2px;}
  .cal-empty-txt{font-size:13px;color:var(--text-muted);margin-top:8px;}
  .cal-bar-wrap{height:4px;background:var(--bg-input);border-radius:2px;overflow:hidden;margin-top:auto;}
  .cal-bar{height:100%;background:linear-gradient(90deg,var(--accent),#22c55e);border-radius:2px;}
  .cal-dif{font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:600;}
  .cal-dif.up{color:var(--accent);} .cal-dif.down{color:var(--out-devol);}

  .overlay{position:fixed;inset:0;background:rgba(15,17,23,.82);backdrop-filter:blur(3px);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
  .overlay.show{display:flex;}
  .spinner{width:42px;height:42px;border:3px solid var(--border-md);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .ov-txt{font-size:13px;font-weight:500;} .ov-prog{width:220px;height:5px;background:var(--bg-input);border-radius:3px;overflow:hidden;}
  .ov-prog-bar{height:100%;background:var(--accent);width:0%;transition:width .3s;}

  .modal{position:fixed;inset:0;background:rgba(15,17,23,.8);backdrop-filter:blur(4px);z-index:600;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal.show{display:flex;}
  .modal-card{background:var(--bg-surface);border:1px solid var(--border-md);border-radius:13px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.5);overflow:hidden;}
  .modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .modal-head h3{font-size:16px;font-weight:700;}
  .modal-head .sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .modal-close{background:transparent;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;line-height:1;}
  .modal-close:hover{color:var(--text-primary);}
  .modal-body{padding:12px 20px 20px;}
  .mrow{display:flex;align-items:center;gap:11px;padding:8px 0;border-bottom:1px solid var(--border);}
  .mrow:last-child{border-bottom:none;}
  .mrow.tot{border-top:2px solid var(--border-accent);margin-top:5px;padding-top:11px;}
  .mico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .mname{flex:1;font-size:12.5px;}
  .mbar-wrap{width:70px;height:5px;background:var(--bg-input);border-radius:3px;overflow:hidden;}
  .mbar{height:100%;border-radius:3px;}
  .mval{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;min-width:70px;text-align:right;}
  .sign-in{color:var(--accent);} .sign-out{color:var(--out-devol);}
  .uni-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;background:var(--accent-dim);color:var(--accent);}
</style>

  clientes:[
    {campo:'emision',sign:+1,color:'--in-emision',label:'Emisión'},
    {campo:'entradaPalletReversa',sign:+1,color:'--in-reversa',label:'Entrada reversa'},
    {campo:'devolucion',sign:-1,color:'--out-devol',label:'Devolución'},
    {campo:'transferencias',sign:-1,color:'--out-transf',label:'Transferencias'},
    {campo:'salidaPalletReconfirmar',sign:-1,color:'--out-reconf',label:'Salida reconfirmar'}
  ],
  retail:[
    {campo:'transferencias',sign:+1,color:'--in-transf',label:'Transferencias'},
    {campo:'salidaPalletReconfirmar',sign:+1,color:'--in-emision',label:'Salida reconfirmar'},
    {campo:'otrasEntradas',sign:+1,color:'--in-otras',label:'Otras entradas'},
    {campo:'entradaPalletReversa',sign:-1,color:'--out-devol',label:'Entrada reversa'},
    {campo:'retiros',sign:-1,color:'--out-retiro',label:'Retiros'},
    {campo:'otrasSalidas',sign:-1,color:'--out-otras',label:'Otras salidas'},
    {campo:'reubicacionSistema',sign:-1,color:'--out-reub',label:'Reubicación sistema'}
  ]
};
var NOMBRE_MES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var DIAS_SEM=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

function pad(n){return n<10?'0'+n:''+n;}
function iso(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d);}
function nfmt(n){if(n===null||n===undefined||isNaN(n))return '—';return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function cvar(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
function num(v){var n=Number(v);return isNaN(n)?0:n;}

function setUniverso(u){
  universo=u;
  document.querySelectorAll('#seg-universo button').forEach(function(b){b.classList.toggle('on',b.dataset.u===u);});
  if(Object.keys(diasData).length) cargar();
}
function cambiarMes(delta){
  mes+=delta; if(mes<0){mes=11;anio--;} if(mes>11){mes=0;anio++;}
  actualizarTituloMes(); cargar();
}
function actualizarTituloMes(){
  document.getElementById('mes-titulo').textContent=NOMBRE_MES[mes]+' '+anio;
}

/* fetch de un día (rango desde=hasta=día) */
function fetchDia(fechaIso){
  var base = universo==='retail' ? (isDev?RET_DIRECT:RET_PROXY) : (isDev?CLI_DIRECT:CLI_PROXY);
  var url=base+'?desde='+fechaIso+'&hasta='+fechaIso+'&_='+Date.now();
  return fetch(url,{cache:'no-cache',headers:{'Accept':'application/json'}})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});
}
function norm(j){
  var o=(j&&j.data)?j.data:j; if(!o)return null;
  var base={saldoInicial:num(o.saldoInicial),saldoFinal:num(o.saldoFinal),diferencia:num(o.diferencia),
            totalEntradas:num(o.totalEntradas),totalSalida:num(o.totalSalida)};
  FLUJOS[universo].forEach(function(f){base[f.campo]=num(o[f.campo]);});
  return base;
}

function ov(show,txt,pct){
  var o=document.getElementById('overlay'); o.classList.toggle('show',show);
  if(txt!==undefined)document.getElementById('ov-txt').textContent=txt;
  if(pct!==undefined)document.getElementById('ov-bar').style.width=pct+'%';
}

async function cargar(){
  var hoy=new Date(); hoy.setHours(12,0,0,0);
  var ultimoDia=new Date(anio,mes+1,0).getDate();
  // no consultar días futuros
  var limite = (anio===hoy.getFullYear()&&mes===hoy.getMonth()) ? hoy.getDate()-1 : ultimoDia;
  if(anio>hoy.getFullYear()||(anio===hoy.getFullYear()&&mes>hoy.getMonth())) limite=0;

  diasData={};
  document.getElementById('btn-hoy').disabled=true;
  ov(true,'Consultando '+NOMBRE_MES[mes]+'…',0);

  var fechas=[];
  for(var d=1; d<=limite; d++) fechas.push({d:d,iso:iso(anio,mes,d)});

  // consultar en lotes de 4 para no saturar
  var lote=4;
  for(var i=0;i<fechas.length;i+=lote){
    var grupo=fechas.slice(i,i+lote);
    ov(true,'Cargando días '+(i+1)+'–'+Math.min(i+lote,fechas.length)+' de '+fechas.length, Math.round(i/Math.max(fechas.length,1)*100));
    await Promise.all(grupo.map(function(g){
      return fetchDia(g.iso).then(function(j){diasData[g.iso]=norm(j);}).catch(function(){diasData[g.iso]=null;});
    }));
  }
  ov(false);
  document.getElementById('btn-hoy').disabled=false;
  render();
}

function render(){
  var grid=document.getElementById('cal-grid');
  var ultimoDia=new Date(anio,mes+1,0).getDate();
  var primerDiaSem=(new Date(anio,mes,1).getDay()+6)%7; // 0=Lun

  // encabezados de días de semana
  var html='';
  DIAS_SEM.forEach(function(ds){html+='<div class="cal-dow">'+ds+'</div>';});
  // celdas vacías antes del día 1
  for(var e=0;e<primerDiaSem;e++) html+='<div class="cal-cell empty"></div>';

  // valores min/max para colorear el saldo final
  var saldos=[]; Object.keys(diasData).forEach(function(k){if(diasData[k])saldos.push(diasData[k].saldoFinal);});
  var minS=Math.min.apply(null,saldos.concat([0])), maxS=Math.max.apply(null,saldos.concat([1]));

  for(var d=1;d<=ultimoDia;d++){
    var key=iso(anio,mes,d), o=diasData[key];
    var dow=(new Date(anio,mes,d).getDay()+6)%7;
    var esFinde=(dow>=5);
    if(!o){
      html+='<div class="cal-cell '+(esFinde?'finde':'')+' nodata"><div class="cal-num">'+d+'</div><div class="cal-empty-txt">—</div></div>';
      continue;
    }
    // intensidad relativa para barra
    var rel=maxS>minS?((o.saldoFinal-minS)/(maxS-minS)):0.5;
    var difCls=o.diferencia>0?'up':(o.diferencia<0?'down':'');
    var difTxt=(o.diferencia>0?'+':'')+nfmt(o.diferencia);
    html+='<div class="cal-cell '+(esFinde?'finde':'')+'" onclick="abrirDia(\''+key+'\')">'+
      '<div class="cal-num">'+d+'</div>'+
      '<div class="cal-saldo">'+nfmt(o.saldoFinal)+'</div>'+
      '<div class="cal-bar-wrap"><div class="cal-bar" style="width:'+Math.round(rel*100)+'%"></div></div>'+
      '<div class="cal-dif '+difCls+'">'+difTxt+'</div>'+
    '</div>';
  }
  grid.innerHTML=html;

  // resumen del mes
  var dias=Object.keys(diasData).filter(function(k){return diasData[k];}).sort();
  if(dias.length){
    var ini=diasData[dias[0]].saldoInicial, fin=diasData[dias[dias.length-1]].saldoFinal;
    document.getElementById('resumen').style.display='flex';
    document.getElementById('r-ini').textContent=nfmt(ini);
    document.getElementById('r-fin').textContent=nfmt(fin);
    var delta=fin-ini;
    var re=document.getElementById('r-delta');
    re.textContent=(delta>=0?'+':'')+nfmt(delta);
    re.style.color=delta>=0?cvar('--accent'):cvar('--out-devol');
    document.getElementById('r-dias').textContent=dias.length;
  } else {
    document.getElementById('resumen').style.display='none';
  }
}

/* Modal desglose del día */
function abrirDia(key){
  var o=diasData[key]; if(!o)return;
  var partes=key.split('-'); var fecha=partes[2]+' '+NOMBRE_MES[parseInt(partes[1])-1]+' '+partes[0];
  document.getElementById('modal-fecha').textContent=fecha;
  document.getElementById('modal-uni').textContent=universo==='retail'?'Retail':'Clientes';

  var flujos=FLUJOS[universo];
  var maxAbs=Math.max.apply(null,flujos.map(function(f){return Math.abs(o[f.campo]||0);}).concat([1]));
  var html='';
  html+=fila('ti-flag','Saldo inicial',o.saldoInicial,'--text-secondary',100,'');
  flujos.forEach(function(f){
    var v=o[f.campo]||0,col=cvar(f.color);
    html+=filaFlujo(f.sign>0?'ti-plus':'ti-minus',f.label,v,col,Math.abs(v)/maxAbs*100,f.sign);
  });
  html+='<div class="mrow tot"><div class="mico" style="background:var(--accent-dim);color:var(--accent)"><i class="ti ti-flag-check"></i></div>'+
        '<div class="mname">Saldo final</div><div class="mbar-wrap"></div>'+
        '<div class="mval" style="color:var(--accent)">'+nfmt(o.saldoFinal)+'</div></div>';
  // diferencia
  var difCls=o.diferencia>=0?'sign-in':'sign-out';
  html+='<div class="mrow"><div class="mico" style="background:var(--bg-input);color:var(--text-secondary)"><i class="ti ti-equal"></i></div>'+
        '<div class="mname">Diferencia neta del día</div><div class="mbar-wrap"></div>'+
        '<div class="mval '+difCls+'">'+(o.diferencia>=0?'+':'')+nfmt(o.diferencia)+'</div></div>';

  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal').classList.add('show');
}
function fila(ico,name,val,colVar,pct,cls){
  var col=cvar(colVar);
  return '<div class="mrow"><div class="mico" style="background:'+col+'22;color:'+col+'"><i class="ti '+ico+'"></i></div>'+
    '<div class="mname">'+name+'</div>'+
    '<div class="mbar-wrap"><div class="mbar" style="width:'+pct+'%;background:'+col+'"></div></div>'+
    '<div class="mval '+cls+'">'+nfmt(val)+'</div></div>';
}
function filaFlujo(ico,name,val,col,pct,sign){
  var cls=sign>0?'sign-in':'sign-out';
  var txt=(sign>0?'+':'−')+nfmt(Math.abs(val));
  return '<div class="mrow"><div class="mico" style="background:'+col+'22;color:'+col+'"><i class="ti '+ico+'"></i></div>'+
    '<div class="mname">'+name+'</div>'+
    '<div class="mbar-wrap"><div class="mbar" style="width:'+pct+'%;background:'+col+'"></div></div>'+
    '<div class="mval '+cls+'">'+txt+'</div></div>';
}
function cerrarModal(){document.getElementById('modal').classList.remove('show');}

/* Init */
(function(){
  var h=new Date(); anio=h.getFullYear(); mes=h.getMonth();
  actualizarTituloMes();
  fetch('/.auth/me').then(function(r){return r.json();}).then(function(d){
    if(d&&d.clientPrincipal){
      var email=d.clientPrincipal.userDetails||'';var np=email.indexOf('@')>0?email.split('@')[0]:email;
      var p=np.replace(/[._-]/g,' ').trim().split(/\s+/);var ini=(p[0]||'?').charAt(0).toUpperCase();if(p[1])ini+=p[1].charAt(0).toUpperCase();
      var a=document.getElementById('at-avatar'),e=document.getElementById('at-user-email');
      if(a){a.textContent=ini;a.title=email;}if(e)e.textContent=email;
    }
  }).catch(function(){});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')cerrarModal();});
  cargar();
})();

</script>
</body>
</html>
