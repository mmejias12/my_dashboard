<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte Emisiones — RDT</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0f1117; --surface:#181b23; --card:#1e222d;
    --border:rgba(255,255,255,0.07); --border-md:rgba(255,255,255,0.12);
    --text:#e8eaf0; --muted:#9da3b4; --dim:#5a6070;
    --red:#C0170C; --green:#4ade80; --yellow:#fcd34d;
  }
  body { background:var(--bg); color:var(--text); font-family:"Segoe UI",system-ui,sans-serif; font-size:13px; }
  header { background:var(--surface); border-bottom:2px solid var(--red); padding:12px 20px; display:flex; align-items:center; gap:12px; }
  .logo { width:30px; height:30px; background:var(--red); border-radius:6px; display:flex; align-items:center; justify-content:center; font-weight:900; color:#fff; font-size:15px; flex-shrink:0; }
  header h1 { font-size:15px; font-weight:600; }
  header small { color:var(--muted); font-size:11px; }
  .filters { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; }
  .field { display:flex; flex-direction:column; gap:4px; }
  .field label { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; }
  .field select, .field input[type=date] { background:var(--card); border:1px solid var(--border-md); border-radius:6px; color:var(--text); padding:7px 10px; font-size:13px; outline:none; }
  .field select:focus, .field input:focus { border-color:var(--red); }
  .btn { border:none; border-radius:6px; padding:8px 20px; font-size:13px; font-weight:600; cursor:pointer; align-self:flex-end; }
  .btn-red { background:var(--red); color:#fff; }
  .btn-red:hover { filter:brightness(1.15); }
  .btn-red:disabled { opacity:.4; cursor:not-allowed; }
  .btn-green { background:#166534; color:#86efac; display:none; }
  .btn-green:hover { background:#14532d; }
  .stats { display:flex; gap:10px; padding:12px 20px; flex-wrap:wrap; }
  .stat { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 16px; min-width:110px; }
  .stat-v { font-size:22px; font-weight:700; }
  .stat-l { font-size:11px; color:var(--muted); margin-top:2px; }
  .estado { padding:10px 20px; color:var(--muted); font-size:12px; min-height:32px; }
  .progress { height:3px; background:var(--border); border-radius:2px; margin:6px 0 2px; width:280px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--red); border-radius:2px; transition:width .2s; }
  .spinner { display:inline-block; width:12px; height:12px; border:2px solid var(--border); border-top-color:var(--red); border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .table-wrap { padding:0 20px 30px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { background:var(--surface); border-bottom:2px solid var(--red); padding:9px 10px; text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--dim); white-space:nowrap; }
  tbody tr { border-bottom:1px solid var(--border); }
  tbody tr:hover { background:var(--surface); }
  tbody td { padding:8px 10px; white-space:nowrap; }
  .badge { display:inline-block; padding:2px 7px; border-radius:4px; font-size:11px; font-weight:600; }
  .b-cerrado  { background:rgba(74,222,128,.15);  color:#4ade80; }
  .b-anulado  { background:rgba(248,113,113,.15); color:#f87171; }
  .b-despacho { background:rgba(96,165,250,.15);  color:#60a5fa; }
  .b-pendiente{ background:rgba(252,211,77,.15);  color:#fcd34d; }
  .b-default  { background:rgba(255,255,255,.07); color:var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">R</div>
  <div><h1>Reporte de Emisiones</h1><small>RDT · REDTEC S.A.</small></div>
</header>

<div class="filters">
  <div class="field">
    <label>Operacion</label>
    <select id="tipoOp">
      <option value="">Todas</option>
      <option value="Emision" selected>Emision</option>
      <option value="Recepcion">Recepcion</option>
      <option value="Traslado">Traslado</option>
    </select>
  </div>
  <div class="field"><label>Desde</label><input type="date" id="desde"></div>
  <div class="field"><label>Hasta</label><input type="date" id="hasta"></div>
  <button class="btn btn-red" id="btnBuscar" onclick="buscar()">Consultar</button>
  <button class="btn btn-green" id="btnExcel" onclick="exportarExcel()">Descargar Excel</button>
</div>

<div class="stats" id="stats" style="display:none">
  <div class="stat"><div class="stat-v" id="sTot">0</div><div class="stat-l">Total</div></div>
  <div class="stat"><div class="stat-v" style="color:var(--green)" id="sCerr">0</div><div class="stat-l">Cerrados</div></div>
  <div class="stat"><div class="stat-v" style="color:var(--yellow)" id="sPend">0</div><div class="stat-l">Pendientes</div></div>
  <div class="stat"><div class="stat-v" style="color:#f87171" id="sAnul">0</div><div class="stat-l">Anulados</div></div>
  <div class="stat"><div class="stat-v" style="color:var(--dim)" id="sSinDte">0</div><div class="stat-l">Sin DTE</div></div>
</div>

<div class="estado" id="estado"></div>

<div class="table-wrap">
  <table id="tabla" style="display:none">
    <thead><tr>
      <th>Nro Pedido</th><th>Operacion</th><th>Etapa</th><th>DTE Nro</th>
      <th>Cliente Destino</th><th>Bodega Destino</th><th>Cant. Sol.</th>
      <th>Usuario Creador</th><th>Fecha Creacion</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
var isDev = (location.hostname === 'localhost' || location.hostname === '127.0.0.1');
var BASE_OPS  = isDev
  ? 'https://apirdt1.azurewebsites.net/api/RDTOut/opsxrangofechas'
  : '/proxy/ops';
var BASE_HIST = isDev
  ? 'https://apirdt1.azurewebsites.net/api/RDTOut/historialxnropedido'
  : '/api/historial-proxy';

var datos = [];
var hoy = new Date().toISOString().slice(0,10);
document.getElementById('desde').value = hoy;
document.getElementById('hasta').value = hoy;

function fmtFecha(iso) {
  if (!iso) return '-';
  var d = new Date(iso);
  return d.toLocaleDateString('es-CL') + ' ' + d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
}

function badge(etapa) {
  var e = (etapa||'').toLowerCase();
  var cls = e.indexOf('cerrado')>=0   ? 'b-cerrado'  :
            e.indexOf('anulado')>=0   ? 'b-anulado'  :
            e.indexOf('despacho')>=0  ? 'b-despacho' :
            (e.indexOf('confirmar')>=0 || e.indexOf('pendiente')>=0) ? 'b-pendiente' : 'b-default';
  return '<span class="badge '+cls+'">'+(etapa||'-')+'</span>';
}

function setEstado(msg, loading, pct) {
  var el = document.getElementById('estado');
  el.innerHTML = (loading ? '<span class="spinner"></span>' : '') + msg +
    (pct != null ? '<div class="progress"><div class="progress-fill" id="pbar" style="width:'+pct+'%"></div></div><small id="ptxt"></small>' : '');
}

function updProg(i, tot) {
  var b = document.getElementById('pbar');
  var t = document.getElementById('ptxt');
  var p = Math.round(i / tot * 100);
  if (b) b.style.width = p + '%';
  if (t) t.textContent = i + ' / ' + tot + ' pedidos procesados';
}

async function buscar() {
  var desde = document.getElementById('desde').value;
  var hasta = document.getElementById('hasta').value;
  var tipo  = document.getElementById('tipoOp').value;
  if (!desde || !hasta) { alert('Selecciona fechas'); return; }

  document.getElementById('btnBuscar').disabled = true;
  document.getElementById('tabla').style.display = 'none';
  document.getElementById('btnExcel').style.display = 'none';
  document.getElementById('stats').style.display = 'none';
  document.getElementById('tbody').innerHTML = '';
  datos = [];

  try {
    setEstado('Cargando operaciones...', true);
    var url = BASE_OPS + '?fechaInicio=' + desde + '&fechaFin=' + hasta;
    var res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error('HTTP ' + res.status + ' — ' + res.statusText);
    var ops = await res.json();
    if (!Array.isArray(ops)) ops = [ops];

    var filtradas = tipo ? ops.filter(function(o) { return o.operacion === tipo; }) : ops;
    if (!filtradas.length) {
      setEstado('Sin resultados para el rango seleccionado.');
      document.getElementById('btnBuscar').disabled = false;
      return;
    }

    setEstado('Cruzando historial de ' + filtradas.length + ' pedidos...', true, 0);

    for (var i = 0; i < filtradas.length; i++) {
      var op = filtradas[i];
      updProg(i, filtradas.length);

      var usuarioCreador = op.usuario || '-';
      var fechaCreacion  = op.horaIngreso;

      try {
        var rh = await fetch(BASE_HIST + '?nroPedido=' + op.nroPedido, { headers: { 'Accept': 'application/json' } });
        if (rh.ok) {
          var hist = await rh.json();
          if (Array.isArray(hist)) {
            for (var j = 0; j < hist.length; j++) {
              if (hist[j].glosaHistorial === 'Registro Creado') {
                usuarioCreador = hist[j].usuario || usuarioCreador;
                fechaCreacion  = hist[j].fechaCreacionHistorial || fechaCreacion;
                break;
              }
            }
          }
        }
      } catch(e) { /* mantiene fallback del op */ }

      datos.push({
        nroPedido:      op.nroPedido,
        operacion:      op.operacion,
        etapa:          op.etapaOperacion,
        dteNro:         (op.dteNro && op.dteNro !== 0) ? op.dteNro : 'Sin DTE',
        clienteDestino: op.clienteDestinoStr,
        bodegaDestino:  op.bodegaDestinoStr,
        cantSolicitada: op.cantidadSolicitada,
        usuarioCreador: usuarioCreador,
        fechaCreacion:  fechaCreacion
      });

      await new Promise(function(r) { setTimeout(r, 80); });
    }

    renderTabla();

  } catch(err) {
    setEstado('Error: ' + err.message);
  } finally {
    document.getElementById('btnBuscar').disabled = false;
  }
}

function renderTabla() {
  var tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  var cerr = 0, anul = 0, sinDte = 0;

  datos.forEach(function(d) {
    var e = (d.etapa || '').toLowerCase();
    if (e.indexOf('cerrado') >= 0) cerr++;
    if (e.indexOf('anulado') >= 0) anul++;
    if (d.dteNro === 'Sin DTE') sinDte++;

    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><strong>' + d.nroPedido + '</strong></td>' +
      '<td>' + d.operacion + '</td>' +
      '<td>' + badge(d.etapa) + '</td>' +
      '<td>' + d.dteNro + '</td>' +
      '<td>' + d.clienteDestino + '</td>' +
      '<td style="color:var(--muted)">' + d.bodegaDestino + '</td>' +
      '<td style="text-align:right">' + d.cantSolicitada + '</td>' +
      '<td style="color:var(--yellow)">' + d.usuarioCreador + '</td>' +
      '<td style="color:var(--muted)">' + fmtFecha(d.fechaCreacion) + '</td>';
    tbody.appendChild(tr);
  });

  document.getElementById('sTot').textContent   = datos.length;
  document.getElementById('sCerr').textContent  = cerr;
  document.getElementById('sPend').textContent  = datos.length - cerr - anul;
  document.getElementById('sAnul').textContent  = anul;
  document.getElementById('sSinDte').textContent = sinDte;
  document.getElementById('stats').style.display = 'flex';
  document.getElementById('tabla').style.display = 'table';
  document.getElementById('btnExcel').style.display = 'inline-block';
  setEstado(datos.length + ' registros encontrados.');
}

function exportarExcel() {
  if (!datos.length) return;
  var cols = ['Nro Pedido','Operacion','Etapa','DTE Nro','Cliente Destino','Bodega Destino','Cant. Sol.','Usuario Creador','Fecha Creacion'];
  var esc = function(v) { return '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"'; };
  var rows = datos.map(function(d) {
    return [
      d.nroPedido, d.operacion, d.etapa, d.dteNro,
      d.clienteDestino, d.bodegaDestino, d.cantSolicitada,
      d.usuarioCreador, fmtFecha(d.fechaCreacion)
    ].map(esc).join(',');
  });
  var csv = '\uFEFF' + [cols.map(esc).join(',')].concat(rows).join('\n');
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'emisiones_' + document.getElementById('desde').value + '_' + document.getElementById('hasta').value + '.csv';
  a.click();
}
</script>
</body>
</html>
