name: Snapshot Stocks SAP

# Genera snapshots del stock actual y los movimientos 2026 desde el proxy
# SAP, los guarda como JSON en el repo y los despliega a producción.
#
# Frecuencia: 3 veces al día.
# Chile: UTC-4 (invierno) o UTC-3 (verano). El cron está fijado en UTC.
#
# HORAS PROGRAMADAS (UTC → Chile UTC-4):
#   07:33 UTC ≈ 03:33 Chile  → snapshot principal para reunión 8:30 AM
#                              (SAP ya tiene consolidado el cierre 23:59 del día anterior)
#   16:33 UTC ≈ 12:33 Chile  → refresh mediodía
#   22:33 UTC ≈ 18:33 Chile  → refresh tarde
#
# NOTA: GitHub Actions tiene delays variables (especialmente a las 00/15/30/45 min,
# que son horas pico globales). Por eso usamos minuto 33 (raro) y el cron principal
# a las 03:33 AM Chile, garantizando margen amplio antes de la reunión de 8:30.

on:
  schedule:
    - cron: '33 7,16,22 * * *'
  workflow_dispatch:  # permite ejecutar manualmente desde GitHub UI

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar snapshots
        run: node scripts/generar-snapshots.js
        env:
          STATIC_WEB_APP_URL: https://ashy-island-0089d900f.2.azurestaticapps.net

      - name: Commit y push (si hubo cambios)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "Sin cambios en los snapshots, no hay nada que commitear."
          else
            git commit -m "📊 Snapshot stocks $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✓ Snapshots actualizados y desplegados."
          fi
