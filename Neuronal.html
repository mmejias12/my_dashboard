<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Neural Core</title>

<!-- ✅ LIBRERÍAS CORRECTAS -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>

<style>
body {
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center, #05060a, #000000);
}

/* canvas */
#graph {
    width:100vw;
    height:100vh;
}

/* atmósfera espacial */
.space {
    position:fixed;
    width:100%;
    height:100%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 3px 3px;
    opacity:0.05;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="graph"></div>
<div class="space"></div>

<script>

// 🧠 DATA COHERENTE
const gData = {
nodes: [
    { id:"CORE", type:"core", size:10 },
    { id:"COMERCIAL", type:"area", size:6 },
    { id:"LOGISTICA", type:"area", size:6 },
    { id:"OPERACIONES", type:"area", size:6 },

    { id:"VENTAS", type:"data", size:3 },
    { id:"CLIENTES", type:"data", size:3 },
    { id:"DEVOLUCIONES", type:"data", size:3 },
    { id:"RUTAS", type:"data", size:3 }
],

links: [
    {source:"CORE", target:"COMERCIAL"},
    {source:"CORE", target:"LOGISTICA"},
    {source:"CORE", target:"OPERACIONES"},

    {source:"COMERCIAL", target:"VENTAS"},
    {source:"COMERCIAL", target:"CLIENTES"},

    {source:"LOGISTICA", target:"DEVOLUCIONES"},
    {source:"OPERACIONES", target:"RUTAS"}
]
};

// 🎥 GRAFO
const Graph = ForceGraph3D()(document.getElementById("graph"))
.graphData(gData)
.backgroundColor("rgba(0,0,0,0)")
.showNavInfo(false)

// 🧬 NODOS REALISTAS
.nodeThreeObject(node => {

    const group = new THREE.Group();

    const color =
        node.type === "core" ? 0x00eaff :
        node.type === "area" ? 0xffffff :
        0x888888;

    // núcleo
    const core = new THREE.Mesh(
        new THREE.SphereGeometry(node.size, 48, 48),
        new THREE.MeshStandardMaterial({
            color: color,
            emissive: color,
            emissiveIntensity: node.type === "core" ? 2 : 0.4,
            roughness: 0.3,
            metalness: 0.7
        })
    );

    // glow externo
    const glow = new THREE.Mesh(
        new THREE.SphereGeometry(node.size * 1.6, 48, 48),
        new THREE.MeshBasicMaterial({
            color: 0x00eaff,
            transparent:true,
            opacity:0.05
        })
    );

    group.add(core);
    group.add(glow);

    return group;
})

// conexiones finas tipo nervio
.linkWidth(0.4)
.linkColor(() => "rgba(120,200,255,0.25)")

// ⚡ impulso eléctrico
.linkDirectionalParticles(4)
.linkDirectionalParticleSpeed(0.006)
.linkDirectionalParticleWidth(1.5)
.linkDirectionalParticleColor(() => "#00eaff")

// 🎯 ZOOM REAL
.onNodeClick(node => {
    const dist = 25;
    const ratio = 1 + dist / Math.hypot(node.x,node.y,node.z);

    Graph.cameraPosition(
        {x:node.x*ratio, y:node.y*ratio, z:node.z*ratio},
        node,
        1200
    );
});

// 💡 LUCES CINE
const ambient = new THREE.AmbientLight(0x222244, 0.6);
Graph.scene().add(ambient);

const light = new THREE.PointLight(0x00eaff, 2, 300);
light.position.set(0,0,0);
Graph.scene().add(light);


// 💓 VIDA (pulsación natural, NO robótica)
let t = 0;

function animateNodes(){
    t += 0.02;

    Graph.graphData().nodes.forEach(n => {
        if(n.__threeObj){
            const s = 1 + Math.sin(t + n.x*0.02)*0.06;
            n.__threeObj.scale.set(s,s,s);
        }
    });

    requestAnimationFrame(animateNodes);
}
animateNodes();


// 🎥 CÁMARA CINEMATOGRÁFICA (MUY SUAVE)
let angle = 0;

function animateCamera(){
    angle += 0.0005;

    Graph.cameraPosition({
        x: Math.sin(angle) * 90,
        z: Math.cos(angle) * 90,
        y: 25
    });

    requestAnimationFrame(animateCamera);
}
animateCamera();

Graph.cameraPosition({z:120});

</script>

</body>
</html>
