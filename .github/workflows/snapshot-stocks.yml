name: Snapshot Stocks RDTOut

# Genera cierre-ayer.json con el stock de cierre (CLIENTES) desde el API
# RDTOut/cuadrerojosxrangofechas. Ya no depende del proxy SAP.
#
# Cuando el API de RETAIL esté disponible, el script lo incorpora
# automáticamente (solo descomentar las líneas TODO en generar-snapshots.js).
#
# Frecuencia: 8 veces al día (estrategia de REDUNDANCIA).
# Necesitamos GARANTIZAR que el dato esté listo ANTES de la reunión 8:30 AM.
#
# HORAS (UTC → Chile UTC-4):
#   05:17 ≈ 01:17 Chile · 07:17 ≈ 03:17 · 09:17 ≈ 05:17 · 11:17 ≈ 07:17
#   13:17 ≈ 09:17 · 15:17 ≈ 11:17 · 19:17 ≈ 15:17 · 23:17 ≈ 19:17

on:
  schedule:
    - cron: '17 5,7,9,11,13 * * *'
    - cron: '17 15,19,23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar snapshots
        run: node scripts/generar-snapshots.js
        env:
          REDTEC_API_KEY: ${{ secrets.REDTEC_API_KEY }}

      - name: Commit y push (si hubo cambios)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "Sin cambios en los snapshots, no hay nada que commitear."
          else
            git commit -m "📊 Snapshot stocks $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✓ Snapshots actualizados y desplegados."
          fi
