<script>

// DATA
const gData = {
  nodes: [
    { id: "CORE", group: "core", size: 10 },

    { id: "COMERCIAL", group: "area", size: 6 },
    { id: "LOGISTICA", group: "area", size: 6 },
    { id: "OPERACIONES", group: "area", size: 6 },

    { id: "Q1", group: "data", size: 3 },
    { id: "Q2", group: "data", size: 3 },
    { id: "DEV", group: "data", size: 3 },
    { id: "RUTA", group: "data", size: 3 }
  ],

  links: [
    { source: "CORE", target: "COMERCIAL" },
    { source: "CORE", target: "LOGISTICA" },
    { source: "CORE", target: "OPERACIONES" },

    { source: "COMERCIAL", target: "Q1" },
    { source: "COMERCIAL", target: "Q2" },

    { source: "LOGISTICA", target: "DEV" },
    { source: "OPERACIONES", target: "RUTA" }
  ]
};


// GRAFO
const Graph = ForceGraph3D()(document.getElementById("graph"))
  .backgroundColor("#05060a")
  .graphData(gData)
  .showNavInfo(false)

  // NODOS REALISTAS (core energético)
  .nodeThreeObject(node => {
    const group = new THREE.Group();

    // núcleo
    const core = new THREE.Mesh(
      new THREE.SphereGeometry(node.size, 32, 32),
      new THREE.MeshStandardMaterial({
        color: node.group === "core" ? "#00f0ff" : "#ffffff",
        emissive: node.group === "core" ? "#00f0ff" : "#888888",
        emissiveIntensity: 1
      })
    );

    // aura (glow)
    const glow = new THREE.Mesh(
      new THREE.SphereGeometry(node.size * 1.8, 32, 32),
      new THREE.MeshBasicMaterial({
        color: "#00f0ff",
        transparent: true,
        opacity: 0.08
      })
    );

    group.add(core);
    group.add(glow);

    return group;
  })

  // conexiones más finas
  .linkWidth(0.6)
  .linkColor(() => "rgba(150,200,255,0.2)")

  // sinapsis más sutiles
  .linkDirectionalParticles(3)
  .linkDirectionalParticleSpeed(0.004)
  .linkDirectionalParticleWidth(1.5)
  .linkDirectionalParticleColor(() => "#00eaff")

  // 🎯 CLICK REAL (zoom correcto)
  .onNodeClick(node => {

    const distance = 30;
    const distRatio = 1 + distance / Math.hypot(node.x, node.y, node.z);

    Graph.cameraPosition(
      { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
      node,
      1200
    );
  });


// 💡 iluminación pro
const ambient = new THREE.AmbientLight(0x8888ff, 0.4);
Graph.scene().add(ambient);

const light = new THREE.PointLight(0x00f0ff, 2, 300);
light.position.set(0, 0, 0);
Graph.scene().add(light);


// 💓 pulsación orgánica (MUCHO más natural)
let t = 0;
setInterval(() => {
  t += 0.03;

  Graph.nodes().forEach(n => {
    const s = 1 + Math.sin(t + n.x * 0.02) * 0.05;
    n.__threeObj.scale.set(s, s, s);
  });

}, 30);


// 🎥 cámara cinematográfica (MUY importante)
let angle = 0;

function animateCamera() {
  angle += 0.0008;

  Graph.cameraPosition({
    x: Math.sin(angle) * 80,
    z: Math.cos(angle) * 80,
    y: 30
  });

  requestAnimationFrame(animateCamera);
}

animateCamera();

Graph.cameraPosition({ z: 120 });

</script>
