name: Snapshot Stocks SAP

# Genera snapshots del stock actual y los movimientos 2026 desde el proxy
# SAP, los guarda como JSON en el repo y los despliega a producción.
#
# Frecuencia: 3 veces al día (6:00 / 12:00 / 18:00 hora Chile).
# Chile: UTC-4 (invierno) o UTC-3 (verano). El cron está fijado en UTC,
# por lo que las horas locales pueden moverse ±1h con DST. Es aceptable
# para snapshots; si en algún momento querés horas exactas, ajustar dos
# veces al año.
#
# 6:00 Chile ≈ 10:00 UTC   (invierno UTC-4) / 09:00 UTC (verano UTC-3)
# 12:00 Chile ≈ 16:00 UTC                    / 15:00 UTC
# 18:00 Chile ≈ 22:00 UTC                    / 21:00 UTC
# Usamos los valores de invierno (más recientes).

on:
  schedule:
    - cron: '0 10,16,22 * * *'
  workflow_dispatch:  # permite ejecutar manualmente desde GitHub UI

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar snapshots
        run: node scripts/generar-snapshots.js
        env:
          STATIC_WEB_APP_URL: https://ashy-island-0089d900f.2.azurestaticapps.net

      - name: Commit y push (si hubo cambios)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "Sin cambios en los snapshots, no hay nada que commitear."
          else
            git commit -m "📊 Snapshot stocks $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✓ Snapshots actualizados y desplegados."
          fi
