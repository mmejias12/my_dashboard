name: Snapshot Stocks SAP

# Genera snapshots del stock actual y los movimientos 2026 desde el proxy
# SAP, los guarda como JSON en el repo y los despliega a producción.
#
# Frecuencia: 8 veces al día (estrategia de REDUNDANCIA).
#
# Justificación: GitHub Actions tiene delays variables impredecibles
# en los crones programados (a veces se retrasan 1-3 horas, a veces
# se saltan por completo). Como necesitamos GARANTIZAR que el dato
# del cierre del día anterior esté listo ANTES de la reunión de 8:30 AM,
# programamos múltiples crones nocturnos y de madrugada. Mientras al
# menos UNO corra antes de las 8:30, el archivo cierre-ayer.json
# queda listo.
#
# HORAS PROGRAMADAS (UTC → Chile UTC-4):
#   05:17 UTC ≈ 01:17 Chile  → redundancia madrugada
#   07:17 UTC ≈ 03:17 Chile  → redundancia madrugada
#   09:17 UTC ≈ 05:17 Chile  → redundancia madrugada
#   11:17 UTC ≈ 07:17 Chile  → último intento antes de la reunión 8:30
#   13:17 UTC ≈ 09:17 Chile  → corrección postreunión si delay
#   15:17 UTC ≈ 11:17 Chile  → refresh media mañana
#   19:17 UTC ≈ 15:17 Chile  → refresh tarde
#   23:17 UTC ≈ 19:17 Chile  → refresh fin de día
#
# El minuto 17 (en lugar de 00) reduce probabilidad de pico de carga
# global en GitHub Actions.

on:
  schedule:
    - cron: '17 5,7,9,11,13 * * *'
    - cron: '17 15,19,23 * * *'
  workflow_dispatch:  # permite ejecutar manualmente desde GitHub UI

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar snapshots
        run: node scripts/generar-snapshots.js
        env:
          STATIC_WEB_APP_URL: https://ashy-island-0089d900f.2.azurestaticapps.net

      - name: Commit y push (si hubo cambios)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "Sin cambios en los snapshots, no hay nada que commitear."
          else
            git commit -m "📊 Snapshot stocks $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✓ Snapshots actualizados y desplegados."
          fi
