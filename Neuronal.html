<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Neural System</title>

<!-- LIBRERÍAS -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>

<style>
body {
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center, #05060a, #000000);
}

#graph {
    width:100vw;
    height:100vh;
}

.space {
    position:fixed;
    width:100%;
    height:100%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size:3px;
    opacity:0.05;
    pointer-events:none;
}

.panel {
    position:fixed;
    right:30px;
    bottom:30px;
    width:320px;
    padding:20px;
    background:rgba(5,5,10,0.9);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    font-family:monospace;
    color:#ccc;
    backdrop-filter:blur(10px);
}
</style>
</head>

<body>

<div id="graph"></div>
<div class="space"></div>

<div class="panel" id="info">
[ IA CORE ONLINE ]<br>
Seleccione un nodo...
</div>

<script>

// --------------------
// 🧠 GENERAR DATA (~50 NODOS)
// --------------------
const gData = {
    nodes: [
        { id:"CORE", type:"core", size:12, desc:"Sistema central IA que coordina todas las áreas." },

        { id:"COMERCIAL", type:"area", size:7, ventas:"+12%", clientes:"1240", estado:"Activo", alertas:"OK" },
        { id:"LOGISTICA", type:"area", size:7, devoluciones:"3.2%", estado:"Operativo", alertas:"Retrasos menores" },
        { id:"OPERACIONES", type:"area", size:7, eficiencia:"89%", estado:"Optimizado", alertas:"OK" }
    ],
    links: []
};

const areas = ["COMERCIAL","LOGISTICA","OPERACIONES"];

areas.forEach(area => {

    gData.links.push({source:"CORE", target:area});

    for(let i=1;i<=15;i++){

        const id = `${area}_N${i}`;

        gData.nodes.push({
            id:id,
            type:"data",
            size:2 + Math.random()*1.5,
            desc:`Registro operativo ${i}`
        });

        gData.links.push({source:area, target:id});
    }
});


// --------------------
// 🚀 GRAFO
// --------------------
const Graph = ForceGraph3D()(document.getElementById("graph"))
.graphData(gData)
.backgroundColor("rgba(0,0,0,0)")
.showNavInfo(false)

// nodos visuales
.nodeThreeObject(node => {

    const group = new THREE.Group();

    const color =
        node.type === "core" ? 0x00eaff :
        node.type === "area" ? 0xffffff :
        0x888888;

    const core = new THREE.Mesh(
        new THREE.SphereGeometry(node.size, 48, 48),
        new THREE.MeshStandardMaterial({
            color,
            emissive: color,
            emissiveIntensity: node.type === "core" ? 2 : 0.5,
            metalness:0.9,
            roughness:0.2
        })
    );

    const glow = new THREE.Mesh(
        new THREE.SphereGeometry(node.size*1.6, 32, 32),
        new THREE.MeshBasicMaterial({
            color:0x00eaff,
            transparent:true,
            opacity:0.04
        })
    );

    group.add(core);
    group.add(glow);

    return group;
})

// conexiones
.linkWidth(0.4)
.linkColor(()=>"rgba(120,200,255,0.25)")

// sinapsis
.linkDirectionalParticles(4)
.linkDirectionalParticleSpeed(0.006)
.linkDirectionalParticleWidth(1.2)
.linkDirectionalParticleColor(()=>"#00eaff")

// click con info
.onNodeClick(node => {

    let html = `<b>[ ${node.id} ]</b><br><br>`;

    if(node.type==="core"){
        html += node.desc;
    }
    else if(node.type==="area"){
        Object.keys(node).forEach(k=>{
            if(!['id','type','size'].includes(k)){
                html += `${k.toUpperCase()}: ${node[k]}<br>`;
            }
        });
    }
    else{
        html += node.desc;
    }

    document.getElementById("info").innerHTML = html;

    const dist=25;
    const ratio=1 + dist / Math.hypot(node.x,node.y,node.z);

    Graph.cameraPosition(
        {x:node.x*ratio, y:node.y*ratio, z:node.z*ratio},
        node,
        1200
    );
});

// fuerzas (orden visual)
Graph.d3Force('charge').strength(-120);
Graph.d3Force('link').distance(25);


// --------------------
// 💡 LUCES
// --------------------
Graph.scene().add(new THREE.AmbientLight(0x222244,0.7));

const light = new THREE.PointLight(0x00eaff,2,300);
light.position.set(0,0,0);
Graph.scene().add(light);


// --------------------
// 💓 VIDA (PULSO)
// --------------------
let t=0;

function animate(){
    t+=0.02;

    Graph.graphData().nodes.forEach(n=>{
        if(n.__threeObj){
            const s=1+Math.sin(t+n.x*0.02)*0.04;
            n.__threeObj.scale.set(s,s,s);
        }
    });

    requestAnimationFrame(animate);
}
animate();


// --------------------
// 🔴 ACTIVIDAD IA
// --------------------
setInterval(()=>{
    const nodes=Graph.graphData().nodes;
    const n=nodes[Math.floor(Math.random()*nodes.length)];

    if(n.__threeObj){
        n.__threeObj.scale.set(1.5,1.5,1.5);
        setTimeout(()=>n.__threeObj.scale.set(1,1,1),300);
    }
},1000);


// --------------------
// 🎥 CÁMARA CONTROLABLE
// --------------------
let auto=true;

Graph.controls().addEventListener('start',()=>auto=false);

function cam(){
    if(auto){
        const time=Date.now()*0.0003;

        Graph.cameraPosition({
            x:Math.sin(time)*90,
            z:Math.cos(time)*90,
            y:25
        });
    }
    requestAnimationFrame(cam);
}
cam();

// inicio
Graph.cameraPosition({z:120});

</script>

</body>
</html>
