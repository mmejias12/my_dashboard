<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Retiros — REDTEC M3LINK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg-page:#0f1117; --bg-surface:#181b23; --bg-card:#1e222d;
  --bg-input:#252932; --bg-hover:#252d3a;
  --border:rgba(255,255,255,0.07); --border-md:rgba(255,255,255,0.12);
  --text-pri:#e8eaf0; --text-sec:#9da3b4; --text-muted:#5a6070;
  --accent:#4ade80; --red-logo:#C0170C;
}
html,body { height:100%; font-family:"Inter",sans-serif; font-size:13px;
  background:var(--bg-page); color:var(--text-pri); -webkit-font-smoothing:antialiased; overflow:hidden; }

.topbar { position:fixed;top:0;left:0;right:0;z-index:200;height:50px;
  background:var(--bg-surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 1.25rem;gap:12px; }
.logo { display:flex;align-items:center;gap:9px; }
.logo-box { width:27px;height:27px;border-radius:6px;background:var(--red-logo);
  display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:12px; }
.logo-name { font-weight:600;font-size:13.5px; }
.logo-sep { width:1px;height:18px;background:var(--border-md);margin:0 6px; }
.topbar-title { font-size:12.5px;color:var(--text-sec);display:flex;align-items:center;gap:7px; }
.live-dot { width:7px;height:7px;background:var(--accent);border-radius:50%;
  animation:pulse 2.5s ease-in-out infinite;box-shadow:0 0 6px var(--accent); }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-right { margin-left:auto; }
.back-btn { font-size:11.5px;color:var(--text-sec);text-decoration:none;
  display:flex;align-items:center;gap:5px;padding:4px 10px;
  border:1px solid var(--border-md);border-radius:6px;transition:background .12s; }
.back-btn:hover { background:var(--bg-hover); }

#deck-canvas { position:fixed;top:50px;left:0;right:0;bottom:0; }

.panel { position:fixed;top:62px;left:12px;z-index:100;width:255px;
  display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 74px);overflow-y:auto; }
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.pcard { background:rgba(24,27,35,.93);border:1px solid rgba(255,255,255,.09);
  border-radius:12px;padding:.875rem;backdrop-filter:blur(12px); }

.ctrl-label { font-size:10px;color:var(--text-muted);margin-bottom:4px;
  text-transform:uppercase;letter-spacing:.5px; }

.ctrl-date:focus { border-color:var(--accent); }
.date-row { display:flex;gap:4px;align-items:center; }
.date-sep { font-size:11px;color:var(--text-muted);flex-shrink:0; }
.ctrl-date { font-size:11px;padding:6px 7px;border:1px solid var(--border-md);
  border-radius:6px;background:rgba(37,41,50,.9);color:var(--text-pri);
  outline:none;font-family:"Inter",sans-serif;width:100%;min-width:0;color-scheme:dark; }
.btn-load { width:100%;margin-top:8px;padding:7px;border:1px solid rgba(74,222,128,.3);
  border-radius:6px;background:rgba(74,222,128,.1);color:var(--accent);cursor:pointer;
  font-size:12px;font-weight:600;font-family:"Inter",sans-serif;transition:background .12s; }
.btn-load:hover { background:rgba(74,222,128,.2); }
.btn-load:disabled { opacity:.4;cursor:not-allowed; }

.stat-row { display:flex;justify-content:space-between; }
.stat-item { text-align:center; }
.stat-val { font-size:18px;font-weight:600;color:var(--accent); }
.stat-lbl { font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px; }

.sec-title { font-size:11px;font-weight:600;color:var(--text-pri);margin-bottom:7px; }
.chips { display:flex;flex-wrap:wrap;gap:5px; }
.chip { padding:3px 10px;border-radius:20px;border:1px solid var(--border-md);
  font-size:10.5px;cursor:pointer;font-weight:500;transition:all .12s;
  background:var(--bg-card);color:var(--text-sec); }

.leg-item { display:flex;align-items:center;justify-content:space-between;padding:3px 0; }
.leg-left { display:flex;align-items:center;gap:7px; }
.leg-dot { width:9px;height:9px;border-radius:50%; }
.leg-name { font-size:11px;color:var(--text-sec); }
.leg-val { font-size:11px;font-family:"JetBrains Mono",monospace;color:var(--text-pri);font-weight:500; }
.leg-bar-wrap { height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:2px; }
.leg-bar { height:3px;border-radius:2px;transition:width .5s ease; }

.tooltip { position:fixed;z-index:300;background:rgba(20,23,31,.97);
  border:1px solid rgba(255,255,255,.12);border-radius:10px;
  padding:.75rem 1rem;pointer-events:none;min-width:195px;
  backdrop-filter:blur(10px);box-shadow:0 8px 24px rgba(0,0,0,.5);display:none; }
.tt-name { font-size:13px;font-weight:600;margin-bottom:5px; }
.tt-sub { font-size:10px;color:var(--text-muted);margin-bottom:6px;line-height:1.4; }
.tt-row { display:flex;justify-content:space-between;gap:14px;font-size:11px;margin-top:3px; }
.tt-lbl { color:var(--text-muted); }
.tt-val { color:var(--text-pri);font-weight:500;font-family:"JetBrains Mono",monospace; }

.hint { position:fixed;bottom:14px;right:14px;z-index:100;
  background:rgba(24,27,35,.85);border:1px solid rgba(255,255,255,.07);
  border-radius:8px;padding:6px 12px;font-size:10.5px;color:var(--text-muted);
  backdrop-filter:blur(8px); }

.spinner { width:22px;height:22px;border:2px solid rgba(255,255,255,.1);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px; }
@keyframes spin{to{transform:rotate(360deg)}}
.map-state { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:150;text-align:center;color:var(--text-muted);pointer-events:none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><div class="logo-box">R</div><span class="logo-name">REDTEC</span></div>
  <div class="logo-sep"></div>
  <div class="topbar-title"><div class="live-dot"></div>Mapa de retiros en vivo</div>
  <div class="topbar-right">
    <a href="m3link_dashboard_dark.html" class="back-btn">← Volver</a>
  </div>
</div>

<canvas id="deck-canvas"></canvas>
<div class="map-state" id="map-state"><div style="font-size:12px">Selecciona un período y presiona Cargar</div></div>
<div class="tooltip" id="tooltip"></div>
<div class="hint">🖱 Drag para rotar · Scroll para zoom · Hover sobre columna para detalle</div>

<div class="panel">
  <div class="pcard">
    <div class="ctrl-label">Período</div>
    <div class="date-row">
      <input type="date" id="d1" class="ctrl-date">
      <span class="date-sep">—</span>
      <input type="date" id="d2" class="ctrl-date">
    </div>
    <button class="btn-load" id="btn-load" onclick="loadData()">⟳ Cargar mapa</button>
  </div>
  <div class="pcard" id="stats-card" style="display:none">
    <div class="stat-row">
      <div class="stat-item"><div class="stat-val" id="st-pts">—</div><div class="stat-lbl">Ubicaciones</div></div>
      <div class="stat-item"><div class="stat-val" id="st-pal" style="color:#60a5fa">—</div><div class="stat-lbl">Pallets</div></div>
      <div class="stat-item"><div class="stat-val" id="st-ops" style="color:#fcd34d">—</div><div class="stat-lbl">Operaciones</div></div>
    </div>
  </div>
  <div class="pcard" id="filter-card" style="display:none">
    <div class="sec-title">Filtrar por retailer</div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="pcard" id="legend-card" style="display:none">
    <div class="sec-title">Top ubicaciones · pallets</div>
    <div id="legend"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/deck.gl/8.9.27/deck.gl.min.js"></script>
<script>
var BODEGAS = {
  "ZWM01 CD WM LO AGUIRRE SECO":[-70.7892,-33.4728,"WM","Lo Aguirre"],
  "ZWM02 CD WM QUILICURA FRIO":[-70.7274,-33.3601,"WM","Quilicura"],
  "ZWM11 CD WM EL PEÑON":[-70.7341,-33.5614,"WM","El Peñón"],
  "00041 HIPER HUECHURABA VESPUCI":[-70.6512,-33.3689,"WM","Huechuraba"],
  "00626 HIPER PPE GALES LA REINA":[-70.5743,-33.4502,"WM","La Reina"],
  "ZCS01 CD CENCOSUD NOVICIADO":[-70.8734,-33.3921,"CC","Noviciado"],
  "ZT434 CD TOTTUS CONGELADOS":[-70.6892,-33.4567,"TT","Santiago"],
  "ZTT01 CD TOTTUS LA FARFANA":[-70.7654,-33.4801,"TT","La Farfana"],
  "ZUN01 CD UNIMARC LO AGUIRRE":[-70.7756,-33.4812,"SM","Lo Aguirre"],
  "ZAL03 CD ALVI AEROPARQUE":[-70.7923,-33.3845,"SM","Aeroparque"],
  "REDTEC SANTIAGO":[-70.6534,-33.4401,"RT","Santiago"],
  "REDTEC TALCA":[-71.6554,-35.4264,"RT","Talca"],
  "LAF CD RENCA":[-70.7234,-33.4123,"OT","Renca"],
  "PUNTO AZUL TIL-TIL":[-70.9234,-33.0934,"OT","Til-Til"],
  "HAMBURGO CD RENCA":[-70.7134,-33.4023,"OT","Renca"],
  "HAMBURGO TRANSFERENCIA CONCEPCION":[-73.0444,-36.8201,"OT","Concepción"],
  "LAF TRANSFERENCIA CONCEPCION":[-73.0544,-36.8301,"OT","Concepción"],
  "ALIMENTOS ANDINO RENCA":[-70.7334,-33.4223,"OT","Renca"],
  "ARCOR CERRILLOS Gral. Velasquez 9309":[-70.7234,-33.5001,"OT","Cerrillos"],
  "VIRUTEX CD PUDAHUEL":[-70.7834,-33.4334,"OT","Pudahuel"],
  "ALIFRUT RENGO PLANTA":[-70.8634,-34.4134,"OT","Rengo"],
  "QUINTA VESPUCIO":[-70.6534,-33.4934,"OT","Santiago"],
  "PF CENTRO DISTRIBUCION TALCA":[-71.6454,-35.4364,"OT","Talca"],
  "PF TALCA PLANTA 1":[-71.6354,-35.4264,"OT","Talca"],
  "PF RANCAGUA":[-70.7401,-34.1701,"OT","Rancagua"],
  "PF CONCEPCION":[-73.0544,-36.8101,"OT","Concepción"],
  "PF PUERTO MONTT":[-72.9424,-41.4693,"OT","Puerto Montt"],
  "PF TEMUCO":[-72.5904,-38.7359,"OT","Temuco"],
  "PF TDR VALDIVIA":[-73.2452,-39.8196,"OT","Valdivia"],
  "PF LA SERENA":[-71.2520,-29.9027,"OT","La Serena"],
  "PF ANTOFAGASTA":[-70.3954,-23.6509,"OT","Antofagasta"],
  "PF IQUIQUE":[-70.1431,-20.2208,"OT","Iquique"],
  "PF ARICA":[-70.3126,-18.4783,"OT","Arica"],
  "PF COPIAPO":[-70.3323,-27.3668,"OT","Copiapó"],
  "PF CHILLAN":[-72.1034,-36.6063,"OT","Chillán"],
  "PF SANTIAGO PLANTA":[-70.6434,-33.4601,"OT","Santiago"],
  "MARGARITA UAUY E HIJOS":[-70.6234,-33.4801,"OT","Santiago"],
  "ZSB CD SALCO BRAND":[-70.6834,-33.4201,"OT","Santiago"],
  "DISTRIBUIDORA LAGOS SAN BDO":[-70.7534,-33.5801,"OT","San Bernardo"]
};
var RC = {WM:[59,130,246],CC:[245,158,11],TT:[239,68,68],SM:[139,92,246],RT:[74,222,128],OT:[107,114,128]};
var RN = {WM:"Walmart",CC:"Cencosud",TT:"Tottus",SM:"SMU/Alvi",RT:"Redtec",OT:"Otros"};

var API_PROXY="/api/ops",API_DIRECT="https://apirdt1.azurewebsites.net/api/rdtd9fd8f96a6970ff1e18c510952fddd45cc182e3cdrt/pbi/OpsXRangoFechas";
var isLocal=location.protocol==="file:",isDev=["localhost","127.0.0.1"].includes(location.hostname);
var rawData=[],puntos=[],activeR={WM:1,CC:1,TT:1,SM:1,RT:1,OT:1};
var deckInst=null;

window.addEventListener("DOMContentLoaded",function(){
  var h=new Date(),y=h.getFullYear(),m=String(h.getMonth()+1).padStart(2,"0"),d=String(h.getDate()).padStart(2,"0");
  document.getElementById("d2").value=y+"-"+m+"-"+d;
  document.getElementById("d1").value=y+"-"+m+"-01";
  initDeck();
});

function initDeck(){
  deckInst=new deck.Deck({
    canvas:"deck-canvas",
    width:"100%",height:"100%",
    initialViewState:{longitude:-70.65,latitude:-34.5,zoom:5.8,pitch:50,bearing:-12,minZoom:4,maxZoom:14},
    controller:true,
    onViewStateChange:function(o){deckInst.setProps({viewState:o.viewState});},
    layers:[baseTiles()],
    views:[new deck.MapView({repeat:false})],
    _typedArrayManagerProps:{overAlloc:1,poolSize:0}
  });
}

function baseTiles(){
  return new deck.TileLayer({
    id:"base-tiles",
    data:"https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png",
    minZoom:0,maxZoom:19,tileSize:256,
    renderSubLayers:function(props){
      var bbox=props.tile.bbox;
      return new deck.BitmapLayer(props,{
        data:null,
        image:props.data,
        bounds:[bbox.west,bbox.south,bbox.east,bbox.north]
      });
    }
  });
}

function loadData(){
  var btn=document.getElementById("btn-load");
  btn.disabled=true;btn.textContent="Cargando...";
  document.getElementById("map-state").innerHTML='<div class="spinner"></div><div style="font-size:12px">Consultando API...</div>';
  var d1=document.getElementById("d1").value,d2=document.getElementById("d2").value;
  var url=(isLocal||isDev)?API_DIRECT+"?fechaInicial="+d1+"&fechaFinal="+d2:API_PROXY+"?fechaInicio="+d1+"&fechaFin="+d2;
  fetch(url,{headers:{"Accept":"application/json"}})
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(data){
      rawData=Array.isArray(data)?data:[data];
      procesarDatos();
      btn.disabled=false;btn.textContent="⟳ Cargar mapa";
    })
    .catch(function(e){
      document.getElementById("map-state").innerHTML='<div style="color:#f87171;font-size:12px">Error: '+e.message+"</div>";
      btn.disabled=false;btn.textContent="⟳ Cargar mapa";
    });
}

function approxCoords(b){
  if(b.indexOf("ARICA")>=0)        return[-70.31,-18.47];
  if(b.indexOf("IQUIQUE")>=0)      return[-70.14,-20.22];
  if(b.indexOf("ANTOFAGASTA")>=0)  return[-70.39,-23.65];
  if(b.indexOf("COPIAPO")>=0||b.indexOf("COPIAP")>=0)return[-70.33,-27.36];
  if(b.indexOf("LA SERENA")>=0||b.indexOf("COQUIMBO")>=0)return[-71.25,-29.90];
  if(b.indexOf("VALPARAISO")>=0||b.indexOf("VIÑA")>=0||b.indexOf("VINA")>=0)return[-71.61,-33.04];
  if(b.indexOf("RANCAGUA")>=0)     return[-70.74,-34.17];
  if(b.indexOf("TALCA")>=0)        return[-71.65,-35.42];
  if(b.indexOf("CHILLAN")>=0||b.indexOf("CHILLÁN")>=0)return[-72.10,-36.60];
  if(b.indexOf("CONCEPCION")>=0||b.indexOf("CONCEPC")>=0||b.indexOf("BIOBIO")>=0)return[-73.04,-36.82];
  if(b.indexOf("TEMUCO")>=0)       return[-72.59,-38.73];
  if(b.indexOf("VALDIVIA")>=0)     return[-73.24,-39.81];
  if(b.indexOf("PUERTO MONTT")>=0||b.indexOf("PTO MONTT")>=0)return[-72.94,-41.46];
  if(b.indexOf("QUILICURA")>=0)    return[-70.72,-33.36];
  if(b.indexOf("HUECHURABA")>=0)   return[-70.65,-33.36];
  if(b.indexOf("RENCA")>=0)        return[-70.72,-33.41];
  if(b.indexOf("CERRILLOS")>=0)    return[-70.72,-33.50];
  if(b.indexOf("PUDAHUEL")>=0)     return[-70.78,-33.43];
  if(b.indexOf("LO AGUIRRE")>=0)   return[-70.78,-33.47];
  if(b.indexOf("TIL-TIL")>=0||b.indexOf("TILTIL")>=0)return[-70.92,-33.09];
  if(b.indexOf("BUIN")>=0)         return[-70.73,-33.73];
  if(b.indexOf("PEÑAFLOR")>=0||b.indexOf("PENAFLOR")>=0)return[-70.88,-33.65];
  if(b.indexOf("SAN BERNARDO")>=0||b.indexOf("SAN BDO")>=0)return[-70.73,-33.59];
  if(b.indexOf("MAIPU")>=0||b.indexOf("MAIPÚ")>=0)return[-70.76,-33.52];
  return[-70.65+(Math.random()-.5)*.06,-33.45+(Math.random()-.5)*.06];
}

function procesarDatos(){
  var retiros=rawData.filter(function(r){return(r.operacion||"").trim().toLowerCase()==="retiro";});
  var mapa={};
  retiros.forEach(function(r){
    var b=r.bodegaOrigenStr||"";
    if(!mapa[b])mapa[b]={nombre:b,pallets:0,ops:0,retailer:"OT",ciudad:b,coords:null};
    mapa[b].pallets+=(r.cantidadConfirmada||0);
    mapa[b].ops+=1;
  });
  puntos=[];
  Object.keys(mapa).forEach(function(b){
    var info=mapa[b],coords,retailer="OT",ciudad=b;
    if(BODEGAS[b]){coords=BODEGAS[b].slice(0,2);retailer=BODEGAS[b][2];ciudad=BODEGAS[b][3];}
    else{
      var u=b.toUpperCase();
      if(u.indexOf("WALMART")>=0||u.indexOf("ZWM")>=0)retailer="WM";
      else if(u.indexOf("CENCOSUD")>=0||u.indexOf("ZCS")>=0)retailer="CC";
      else if(u.indexOf("TOTTUS")>=0||u.indexOf("ZTT")>=0||u.indexOf("ZT4")>=0)retailer="TT";
      else if(u.indexOf("UNIMARC")>=0||u.indexOf("ZUN")>=0||u.indexOf("ALVI")>=0||u.indexOf("SMU")>=0)retailer="SM";
      else if(u.indexOf("REDTEC")>=0)retailer="RT";
      coords=approxCoords(u);
    }
    if(coords){puntos.push({nombre:b,ciudad:ciudad,coords:coords,pallets:info.pallets,ops:info.ops,retailer:retailer});}
  });
  puntos.sort(function(a,b){return b.pallets-a.pallets;});
  renderLayers();
  renderStats();
  renderFilters();
  renderLegend();
  document.getElementById("map-state").innerHTML="";
}

function renderLayers(){
  if(!deckInst)return;
  var vis=puntos.filter(function(p){return activeR[p.retailer];});
  var maxP=vis.length?vis[0].pallets:1;

  var colLayer=new deck.ColumnLayer({
    id:"cols",data:vis,
    diskResolution:20,radius:6000,extruded:true,pickable:true,
    getPosition:function(d){return d.coords;},
    getElevation:function(d){return Math.max(800,(d.pallets/maxP)*150000);},
    getFillColor:function(d){var c=RC[d.retailer]||RC.OT;return[c[0],c[1],c[2],210];},
    getLineColor:function(d){var c=RC[d.retailer]||RC.OT;return[c[0],c[1],c[2],255];},
    lineWidthMinPixels:1,
    onHover:function(info){showTip(info);},
    transitions:{getElevation:{duration:500,type:"spring"}}
  });

  var glowLayer=new deck.ScatterplotLayer({
    id:"glow",data:vis,pickable:false,opacity:.12,stroked:false,filled:true,
    radiusScale:1,radiusMinPixels:6,radiusMaxPixels:70,
    getPosition:function(d){return d.coords;},
    getRadius:function(d){return Math.max(10000,(d.pallets/maxP)*90000);},
    getFillColor:function(d){var c=RC[d.retailer]||RC.OT;return[c[0],c[1],c[2],60];}
  });

  var lblLayer=new deck.TextLayer({
    id:"labels",data:vis.filter(function(p){return p.pallets>=50;}),
    pickable:false,
    getPosition:function(d){return[d.coords[0],d.coords[1],Math.max(800,(d.pallets/maxP)*150000)+3000];},
    getText:function(d){return d.pallets.toLocaleString("es-CL");},
    getSize:12,getColor:[255,255,255,200],
    getTextAnchor:"middle",getAlignmentBaseline:"bottom",
    fontFamily:"JetBrains Mono, monospace",fontWeight:600
  });

  deckInst.setProps({layers:[baseTiles(),glowLayer,colLayer,lblLayer]});
}

function showTip(info){
  var tt=document.getElementById("tooltip");
  if(!info.object){tt.style.display="none";return;}
  var d=info.object,c=RC[d.retailer]||RC.OT;
  tt.style.display="block";
  tt.style.left=(info.x+16)+"px";
  tt.style.top=(info.y-10)+"px";
  tt.style.borderColor="rgba("+c[0]+","+c[1]+","+c[2]+",.3)";
  tt.innerHTML=
    '<div class="tt-name" style="color:rgb('+c[0]+","+c[1]+","+c[2]+')">'+(d.ciudad||d.nombre)+"</div>"+
    '<div class="tt-sub">'+d.nombre+"</div>"+
    '<div class="tt-row"><span class="tt-lbl">Retailer</span><span class="tt-val">'+(RN[d.retailer]||d.retailer)+"</span></div>"+
    '<div class="tt-row"><span class="tt-lbl">Pallets conf.</span><span class="tt-val">'+d.pallets.toLocaleString("es-CL")+"</span></div>"+
    '<div class="tt-row"><span class="tt-lbl">Operaciones</span><span class="tt-val">'+d.ops+"</span></div>";
}

function renderStats(){
  var tp=puntos.reduce(function(s,p){return s+p.pallets;},0);
  var to=puntos.reduce(function(s,p){return s+p.ops;},0);
  document.getElementById("st-pts").textContent=puntos.length;
  document.getElementById("st-pal").textContent=tp.toLocaleString("es-CL");
  document.getElementById("st-ops").textContent=to;
  document.getElementById("stats-card").style.display="block";
}

function renderFilters(){
  var cont=document.getElementById("chips");cont.innerHTML="";
  var rets=[...new Set(puntos.map(function(p){return p.retailer;}))];
  rets.forEach(function(r){
    var c=RC[r]||RC.OT;
    var el=document.createElement("div");
    el.className="chip";
    el.style.cssText="border-color:rgba("+c[0]+","+c[1]+","+c[2]+",.4);color:rgb("+c[0]+","+c[1]+","+c[2]+");background:rgba("+c[0]+","+c[1]+","+c[2]+",.1)";
    el.textContent=RN[r]||r;
    el.onclick=function(){
      activeR[r]=activeR[r]?0:1;
      if(activeR[r]){el.style.cssText="border-color:rgba("+c[0]+","+c[1]+","+c[2]+",.4);color:rgb("+c[0]+","+c[1]+","+c[2]+");background:rgba("+c[0]+","+c[1]+","+c[2]+",.1)";}
      else{el.style.cssText="border-color:rgba(255,255,255,.1);color:#5a6070;background:transparent";}
      renderLayers();
    };
    cont.appendChild(el);
  });
  document.getElementById("filter-card").style.display="block";
}

function renderLegend(){
  var top=puntos.slice(0,8),maxP=top.length?top[0].pallets:1,html="";
  top.forEach(function(p){
    var c=RC[p.retailer]||RC.OT,pct=Math.round((p.pallets/maxP)*100);
    html+='<div class="leg-item"><div class="leg-left"><div class="leg-dot" style="background:rgb('+c[0]+","+c[1]+","+c[2]+')"></div><span class="leg-name">'+(p.ciudad||p.nombre).substring(0,17)+'</span></div><span class="leg-val">'+p.pallets.toLocaleString("es-CL")+"</span></div>"+
      '<div class="leg-bar-wrap"><div class="leg-bar" style="width:'+pct+"%;background:rgb("+c[0]+","+c[1]+","+c[2]+')"></div></div>';
  });
  document.getElementById("legend").innerHTML=html;
  document.getElementById("legend-card").style.display="block";
}
</script>
</body>
</html>
